<!DOCTYPE html>
<html>
<head>
    <title>Employees</title>
    <style>
        body {
            font-family: Arial;
            background: #f4f6f8;
        }
        .container {
            width: 80%;
            margin: 40px auto;
        }
        h2 {
            text-align: center;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
        }
        th, td {
            padding: 10px;
            text-align: center;
        }
        th {
            background: #007BFF;
            color: white;
        }
        tr:nth-child(even) {
            background: #f2f2f2;
        }
        a.button {
            padding: 5px 10px;
            background: red;
            color: white;
            text-decoration: none;
            border-radius: 4px;
        }
        .top {
            text-align: right;
            margin-bottom: 10px;
        }
        .add-btn {
            background: green;
            padding: 8px 12px;
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }
    </style>
</head>

<body>
<div style="background:#007BFF; padding:10px; color:white; display:flex; justify-content:space-between; align-items:center;">
    
    <div>
        <a href="/" style="color:white; margin-right:15px; text-decoration:none;">Home</a>
        <a href="/add/" style="color:white; margin-right:15px; text-decoration:none;">Add Employee</a>
        <a href="/view/" style="color:white; text-decoration:none;">View Employees</a>
    </div>

    <div>
        {% if user.is_authenticated %}
            <a href="/logout/" style="color:white; text-decoration:none;">Logout</a>
        {% else %}
            <a href="/" style="color:white; text-decoration:none;">Login</a>
        {% endif %}
    </div>

</div>
<div class="container">
    <h2>Employee List</h2>

    <div class="top">
        <a href="/add/" class="add-btn">+ Add Employee</a>
    </div>

    <table>
        <tr>
            <th>Name</th>
            <th>Emp ID</th>
            <th>Department</th>
            <th>Salary</th>
            <th>Action</th>
        </tr>

        {% for emp in employees %}
        <tr>
            <td>{{ emp.name }}</td>
            <td>{{ emp.emp_id }}</td>
            <td>{{ emp.department }}</td>
            <td>{{ emp.salary }}</td>
            <td>
                <a href="/delete/{{ emp.id }}" class="button">Delete</a>
            </td>
        </tr>
        {% endfor %}
    </table>

</div>

</body>
</html>
